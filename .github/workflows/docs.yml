name: docs

# Distinct title so it isn't confused with the chant workflow on the same commit.
run-name: docs — ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Cache lexicon schemas
        uses: actions/cache@v5
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - run: chmod +x scripts/build-docs.sh && ./scripts/build-docs.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .docs-dist/chant

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
