name: chant

on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Cache lexicon schemas
        uses: actions/cache@v4
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - name: Generate lexicon artifacts
        run: |
          npm run --prefix lexicons/aws prepack
          npm run --prefix lexicons/azure prepack
          npm run --prefix lexicons/gitlab prepack
          npm run --prefix lexicons/github prepack
          npm run --prefix lexicons/k8s prepack
          npm run --prefix lexicons/flyway prepack
          npm run --prefix lexicons/gcp prepack
          npm run --prefix lexicons/helm prepack
          npm run --prefix lexicons/docker prepack
          npm run --prefix lexicons/slurm prepack
          npm run --prefix lexicons/temporal prepack

      - name: Typecheck
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: Lint example project
        run: npx tsx packages/core/src/cli/main.ts lint lexicons/aws/examples/lambda-function/src --format sarif > results.sarif

      - name: Build example project
        run: npx tsx packages/core/src/cli/main.ts build lexicons/aws/examples/lambda-function/src --output template.json

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Cache lexicon schemas
        uses: actions/cache@v4
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - name: Generate lexicon artifacts
        run: |
          npm run --prefix lexicons/aws prepack
          npm run --prefix lexicons/azure prepack
          npm run --prefix lexicons/gitlab prepack
          npm run --prefix lexicons/github prepack
          npm run --prefix lexicons/k8s prepack
          npm run --prefix lexicons/flyway prepack
          npm run --prefix lexicons/gcp prepack
          npm run --prefix lexicons/helm prepack
          npm run --prefix lexicons/docker prepack
          npm run --prefix lexicons/slurm prepack
          npm run --prefix lexicons/temporal prepack

      - name: Run tests
        run: npx vitest run

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Cache lexicon schemas
        uses: actions/cache@v4
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - name: Generate and validate AWS lexicon
        run: npm run --prefix lexicons/aws prepack

      - name: Generate and validate GitLab lexicon
        run: npm run --prefix lexicons/gitlab prepack

      - name: Generate and validate GitHub lexicon
        run: npm run --prefix lexicons/github prepack

      - name: Generate and validate K8s lexicon
        run: npm run --prefix lexicons/k8s prepack

      - name: Generate and validate Flyway lexicon
        run: npm run --prefix lexicons/flyway prepack

      - name: Generate and validate GCP lexicon
        run: npm run --prefix lexicons/gcp prepack

      - name: Generate and validate Azure lexicon
        run: npm run --prefix lexicons/azure prepack

      - name: Generate and validate Helm lexicon
        run: npm run --prefix lexicons/helm prepack

      - name: Generate and validate Docker lexicon
        run: npm run --prefix lexicons/docker prepack

      - name: Generate and validate Slurm lexicon
        run: npm run --prefix lexicons/slurm prepack

      - name: Generate and validate Temporal lexicon
        run: npm run --prefix lexicons/temporal prepack

  smoke-npm:
    if: false  # disabled — Docker smoke tests are for local/release validation, not every push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: npm smoke tests (docker build)
        run: docker build -f test/Dockerfile.smoke-npm -t chant-smoke-npm .
