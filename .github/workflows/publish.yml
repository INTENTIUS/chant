name: publish

on:
  push:
    tags: ['chant-v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Cache lexicon schemas
        uses: actions/cache@v4
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - run: npm run --prefix lexicons/aws prepack
      - run: npm run --prefix lexicons/azure prepack
      - run: npm run --prefix lexicons/gitlab prepack
      - run: npm run --prefix lexicons/github prepack
      - run: npm run --prefix lexicons/k8s prepack
      - run: npm run --prefix lexicons/flyway prepack
      - run: npm run --prefix lexicons/gcp prepack
      - run: npm run --prefix lexicons/helm prepack
      - run: npm run --prefix lexicons/docker prepack
      - run: npm run --prefix lexicons/slurm prepack
      - run: npx vitest run

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Publish @intentius/chant
        working-directory: packages/core
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-aws
        working-directory: lexicons/aws
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-aws version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-gitlab
        working-directory: lexicons/gitlab
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-gitlab version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-github
        working-directory: lexicons/github
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-github version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-k8s
        working-directory: lexicons/k8s
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-k8s version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-flyway
        working-directory: lexicons/flyway
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-flyway version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-gcp
        working-directory: lexicons/gcp
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-gcp version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-helm
        working-directory: lexicons/helm
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-helm version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-azure
        working-directory: lexicons/azure
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-azure version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-docker
        working-directory: lexicons/docker
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-docker version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public

      - name: Publish @intentius/chant-lexicon-slurm
        working-directory: lexicons/slurm
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-slurm version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public
