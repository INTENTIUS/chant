name: publish

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Cache lexicon schemas
        uses: actions/cache@v4
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - run: bun run --cwd lexicons/aws prepack
      - run: bun run --cwd lexicons/gitlab prepack
      - run: bun run --cwd lexicons/k8s prepack
      - run: bun run --cwd lexicons/flyway prepack
      - run: bun run --cwd lexicons/gcp prepack
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Publish @intentius/chant
        working-directory: packages/core
        run: bun publish --access public --tolerate-republish

      - name: Publish @intentius/chant-lexicon-aws
        working-directory: lexicons/aws
        run: bun publish --access public --tolerate-republish

      - name: Publish @intentius/chant-lexicon-gitlab
        working-directory: lexicons/gitlab
        run: bun publish --access public --tolerate-republish

      - name: Publish @intentius/chant-lexicon-k8s
        working-directory: lexicons/k8s
        run: bun publish --access public --tolerate-republish

      - name: Publish @intentius/chant-lexicon-flyway
        working-directory: lexicons/flyway
        run: bun publish --access public --tolerate-republish

      - name: Publish @intentius/chant-lexicon-gcp
        working-directory: lexicons/gcp
        run: bun publish --access public --tolerate-republish
