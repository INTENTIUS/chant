          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-azure
        working-directory: lexicons/azure
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-azure version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-docker
        working-directory: lexicons/docker
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-docker version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-temporal
        working-directory: lexicons/temporal
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
