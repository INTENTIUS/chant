name: publish

on:
  push:
    tags: ['chant-v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install

      - name: Cache lexicon schemas
        uses: actions/cache@v5
        with:
          path: ~/.chant
          key: lexicon-schemas-${{ hashFiles('lexicons/*/src/**/fetch.ts', 'lexicons/*/src/**/versions.ts') }}
          restore-keys: |
            lexicon-schemas-

      - run: npm run --prefix lexicons/aws prepack
      - run: npm run --prefix lexicons/azure prepack
      - run: npm run --prefix lexicons/gitlab prepack
      - run: npm run --prefix lexicons/github prepack
      - run: npm run --prefix lexicons/forgejo prepack
      - run: npm run --prefix lexicons/github-org prepack
      - run: npm run --prefix lexicons/k8s prepack
      - run: npm run --prefix lexicons/gcp prepack
      - run: npm run --prefix lexicons/helm prepack
      - run: npm run --prefix lexicons/docker prepack
      - run: npm run --prefix lexicons/temporal prepack
      - run: npx vitest run

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          # Deliberately NOT setting registry-url: that flag makes
          # actions/setup-node write an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`,
          # and NODE_AUTH_TOKEN defaults to the literal placeholder
          # `XXXXX-XXXXX-XXXXX-XXXXX` when not provided. That placeholder
          # is sent as auth to the registry on `npm publish`, which then
          # 404s instead of falling through to OIDC. Without registry-url
          # there's no .npmrc; npm publish detects the absent auth + the
          # OIDC id-token environment and exchanges for a short-lived
          # publish token via the trusted-publisher record.
      - run: npm install

      - name: Publish @intentius/chant
        working-directory: packages/core
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-gitlab
        working-directory: lexicons/gitlab
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-gitlab version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-aws
        working-directory: lexicons/aws
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-aws version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-github
        working-directory: lexicons/github
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-github version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-forgejo
        working-directory: lexicons/forgejo
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-forgejo version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-github-org
        working-directory: lexicons/github-org
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-github-org version 2>/dev/null || echo "none")
          [ "$V" = "$P" ] && echo "Already at $V, skipping" || npm publish --access public --provenance

      - name: Publish @intentius/chant-lexicon-k8s
        working-directory: lexicons/k8s
        run: |
          V=$(node -e "process.stdout.write(require('./package.json').version)")
          P=$(npm view @intentius/chant-lexicon-k8s version 2>/dev/null || echo "none")
