# Generated by chant migrate from input/ci.yml

stages:
  - build
  - test
  - deploy
workflow:
  name: Node CI
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  artifacts:
    paths:
      - dist/
    name: dist
    expire_in: '7 days'
  script:
    - npm ci
    - npm run build
  stage: build

deploy:
  image: ubuntu:24.04
  rules:
    - if: '$CI_COMMIT_REF_NAME == ''refs/heads/main'' && $CI_PIPELINE_SOURCE == ''push'''
  needs:
    - test
  script:
    - ./deploy.sh
  stage: deploy

test:
  image: node:$node
  timeout: '15 minutes'
  parallel:
    matrix:
      - NODE:
          - 18
          - 20
          - 22
  needs:
    - build
  script:
    - npm ci
    - npm test
  stage: test
