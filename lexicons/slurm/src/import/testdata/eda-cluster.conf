# EDA HPC cluster — synthesis + simulation + GPU partitions
ClusterName=hpc-eda
ControlMachine=head01.cluster.internal
AuthType=auth/munge
StateSaveLocation=/fsx/slurm/state
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory
SlurmctldParameters=enable_configless
ProctrackType=proctrack/cgroup
PropagateResourceLimitsExcept=MEMLOCK
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=db.cluster.internal
AccountingStorageEnforce=associations,limits,qos
GresTypes=gpu
Licenses=vcs_sim:200,calibre_drc:30,calibre_lvs:20
PriorityType=priority/multifactor
PriorityWeightFairshare=10000
PriorityWeightAge=1000
PriorityDecayHalfLife=14-0

NodeName=cpu[001-032] CPUs=96 RealMemory=196608 Sockets=2 CoresPerSocket=24 ThreadsPerCore=2 State=UNKNOWN
NodeName=gpu[001-004] CPUs=96 RealMemory=1048576 Gres=gpu:a100:8 Feature=efa State=UNKNOWN

PartitionName=synthesis Nodes=cpu[001-032] Default=YES MaxTime=2-00:00:00 State=UP Priority=50
PartitionName=sim Nodes=cpu[001-032] Default=NO MaxTime=7-00:00:00 State=UP Priority=30
PartitionName=gpu_eda Nodes=gpu[001-004] Default=NO MaxTime=1-00:00:00 State=UP Priority=70
