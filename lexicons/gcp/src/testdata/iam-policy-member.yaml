apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: iampolicymembers.iam.cnrm.cloud.google.com
spec:
  group: iam.cnrm.cloud.google.com
  names:
    kind: IAMPolicyMember
    plural: iampolicymembers
    singular: iampolicymember
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - member
                - role
                - resourceRef
              properties:
                member:
                  type: string
                  description: The member identity (e.g., user:email, serviceAccount:email).
                role:
                  type: string
                  description: The IAM role to grant.
                resourceRef:
                  type: object
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    external:
                      type: string
                    namespace:
                      type: string
                condition:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    expression:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
