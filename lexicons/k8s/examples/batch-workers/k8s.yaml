apiVersion: v1
kind: Namespace
metadata:
  name: batch-workers
  labels:
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/part-of: batch-workers

---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-migration
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: data-migration
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: batch
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-migration
    spec:
      serviceAccountName: data-migration-sa
      restartPolicy: OnFailure
      containers:
        - name: data-migration
          image: busybox:1.36
          command:
            - sh
            - -c
            - echo Migrating; sleep 5
          resources:
            limits:
              cpu: '500m'
              memory: '512Mi'
            requests:
              cpu: '250m'
              memory: '512Mi'
          env:
            - name: MIGRATION_VERSION
              value: '42'
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: data-migration-role
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: data-migration
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
      - configmaps
    verbs:
      - get

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-migration-binding
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: data-migration
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: data-migration-role
subjects:
  - kind: ServiceAccount
    name: data-migration-sa
    namespace: batch-workers

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-migration-sa
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: data-migration
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: batch

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: queue-worker-config
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  REDIS_URL: redis://redis:6379
  CONCURRENCY: '4'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue-worker
    spec:
      serviceAccountName: queue-worker-sa
      containers:
        - name: queue-worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - echo Processing; sleep 3600
          resources:
            limits:
              cpu: '1'
              memory: '512Mi'
            requests:
              cpu: '200m'
              memory: '256Mi'
          envFrom:
            - configMapRef:
                name: queue-worker-config
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queue-worker
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: queue-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: queue-worker
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: disruption-budget
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-worker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: queue-worker-role
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - get

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: queue-worker-binding
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: queue-worker-role
subjects:
  - kind: ServiceAccount
    name: queue-worker-sa
    namespace: batch-workers

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: queue-worker-sa
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: worker

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: task-api-config
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: task-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  app.yaml: |
    server:
      port: 8080
    redis:
      url: redis://redis:6379

---
apiVersion: v1
kind: Secret
metadata:
  name: task-api-creds
  namespace: batch-workers
stringData:
  api-key: placeholder
  db-password: placeholder

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: task-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: task-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-api
    spec:
      containers:
        - name: task-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: '500m'
              memory: '256Mi'
            requests:
              cpu: '100m'
              memory: '128Mi'
          envFrom:
            - secretRef:
                name: task-api-env
          volumeMounts:
            - name: config
              mountPath: /etc/task-api
              readOnly: true
            - name: secret
              mountPath: /secrets
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: task-api-config
        - name: secret
          secret:
            secretName: task-api-creds

---
apiVersion: v1
kind: Secret
metadata:
  name: task-api-env
  namespace: batch-workers
stringData:
  DATABASE_URL: postgres://localhost:5432/tasks
  API_SECRET: placeholder

---
apiVersion: v1
kind: Service
metadata:
  name: task-api
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: task-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: task-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-cleanup
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: db-cleanup
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: worker
spec:
  schedule: '0 2 * * *'
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: db-cleanup-sa
          restartPolicy: OnFailure
          containers:
            - name: db-cleanup
              image: busybox:1.36
              command:
                - sh
                - -c
                - echo Cleaning; sleep 10
              env:
                - name: RETENTION_DAYS
                  value: '90'
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: db-cleanup-role
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: db-cleanup
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-cleanup-binding
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: db-cleanup
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: db-cleanup-role
subjects:
  - kind: ServiceAccount
    name: db-cleanup-sa
    namespace: batch-workers

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-cleanup-sa
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: db-cleanup
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: worker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: log-collector-role
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ''
    resources:
      - pods
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-collector-binding
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: log-collector-role
subjects:
  - kind: ServiceAccount
    name: log-collector-sa
    namespace: batch-workers

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: log-collector-config
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  fluent.conf: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: log-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-collector
    spec:
      serviceAccountName: log-collector-sa
      containers:
        - name: log-collector
          image: busybox:1.36
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '128Mi'
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /etc/log-collector
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: log-collector-config
      tolerations:
        - operator: Exists

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-collector-sa
  namespace: batch-workers
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
