worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Populated at startup by entrypoint.sh from /etc/resolv.conf
    resolver KUBE_DNS_PLACEHOLDER valid=30s ipv6=off;

    lua_package_path '/usr/local/openresty/lualib/?.lua;;';

    # Read routing config once at startup, share across workers via global vars.
    init_by_lua_block {
        local cjson = require "cjson"
        local function slurp(path)
            local f, err = io.open(path, "r")
            if not f then error("cannot open " .. path .. ": " .. tostring(err)) end
            local s = f:read("*a")
            f:close()
            return s
        end
        ROUTING_RULES = cjson.decode(slurp("/etc/cell-router/routing-rules.json"))
        CELL_REGISTRY = cjson.decode(slurp("/etc/cell-router/cell-registry.json"))
        ROUTER_CONFIG = cjson.decode(slurp("/etc/cell-router/router-config.json"))
    }

    server {
        listen 8080;
        client_max_body_size 0;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            # Lua sets this before proxy_pass
            set $upstream "";

            access_by_lua_block {
                local cjson = require "cjson"
                local upstream

                for _, rule in ipairs(ROUTING_RULES) do
                    if upstream then break end

                    -- Rule 1: session cookie carries cell prefix (cell1_..., cell2_...)
                    if rule.type == "session_token" then
                        local cookie = ngx.var["cookie_" .. rule.cookieName]
                        if cookie then
                            for prefix, cell_name in pairs(rule.cellPrefixMap) do
                                if cookie:sub(1, #prefix) == prefix then
                                    upstream = CELL_REGISTRY[cell_name]
                                    break
                                end
                            end
                        end

                    -- Rule 2: routable token carries glrt-cell_<id>_ prefix
                    elseif rule.type == "routable_token" then
                        local auth = ngx.req.get_headers()["Authorization"]
                        if auth then
                            local bearer = auth:match("^Bearer (.+)$")
                            if bearer then
                                local cell_id = bearer:match("^glrt%-cell_(%d+)_")
                                if cell_id then
                                    local cell_name = rule.cellIdMap[cell_id]
                                    if cell_name then
                                        upstream = CELL_REGISTRY[cell_name]
                                    end
                                end
                            end
                        end

                    -- Rule 3: path-based fallback via Topology Service lookup
                    elseif rule.type == "path" then
                        local org_slug = ngx.var.uri:match("^/([^/]+)/")
                        if org_slug then
                            local http = require "resty.http"
                            local httpc = http.new()
                            httpc:set_timeout(2000)
                            local ok, res = pcall(function()
                                return httpc:request_uri(
                                    "http://" .. rule.topologyServiceAddress ..
                                    "/api/v1/cell_for_org?org_slug=" .. ngx.escape_uri(org_slug)
                                )
                            end)
                            if ok and res and res.status == 200 then
                                local dok, data = pcall(cjson.decode, res.body)
                                if dok and data.cell and CELL_REGISTRY[data.cell] then
                                    upstream = CELL_REGISTRY[data.cell]
                                end
                            end
                        end
                    end
                end

                -- Default: first cell in registry
                if not upstream then
                    for _, url in pairs(CELL_REGISTRY) do
                        upstream = url
                        break
                    end
                end

                ngx.var.upstream = upstream
            }

            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Connection        "";
            proxy_connect_timeout 5s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }
    }
}
