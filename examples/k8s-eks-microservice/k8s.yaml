apiVersion: v1
kind: LimitRange
metadata:
  name: microservice-limits
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice
    app.kubernetes.io/managed-by: chant
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    app.kubernetes.io/component: limits
spec:
  limits:
    - type: Container
      default:
        cpu: '500m'
        memory: '512Mi'
      defaultRequest:
        cpu: '100m'
        memory: '128Mi'

---
apiVersion: v1
kind: Namespace
metadata:
  name: microservice
  labels:
    app.kubernetes.io/name: microservice
    app.kubernetes.io/managed-by: chant
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    app.kubernetes.io/component: namespace

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: microservice-default-deny
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice
    app.kubernetes.io/managed-by: chant
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: microservice-quota
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice
    app.kubernetes.io/managed-by: chant
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    app.kubernetes.io/component: quota
spec:
  hard:
    limits.cpu: '4'
    limits.memory: '8Gi'
    pods: '50'

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservice-config
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  config.yaml: 'server:
  port: 8080
  gracefulShutdown: 30s
database:
  maxConnections: 20
  idleTimeout: 5m
cache:
  ttl: 60s'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-api
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/part-of: eks-microservice
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: microservice-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microservice-api
        app.kubernetes.io/part-of: eks-microservice
        app.kubernetes.io/version: v1.0.0
    spec:
      containers:
        - name: microservice-api
          image: nginxinc/nginx-unprivileged:stable
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: '200m'
              memory: '256Mi'
            limits:
              cpu: '1'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: microservice-api
      serviceAccountName: microservice-app-sa

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microservice-api
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/part-of: eks-microservice
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microservice-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: microservice-api
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/part-of: eks-microservice
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/component: disruption-budget
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microservice-api

---
apiVersion: v1
kind: Service
metadata:
  name: microservice-api
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-api
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/part-of: eks-microservice
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: microservice-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microservice-app-sa
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-app-sa
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: service-account
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eks-microservice-app-role

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:metrics-server-aggregated-reader
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
    rbac.authorization.k8s.io/aggregate-to-admin: 'true'
    rbac.authorization.k8s.io/aggregate-to-edit: 'true'
    rbac.authorization.k8s.io/aggregate-to-view: 'true'
spec:
  rules:
    - apiGroups:
        - metrics.k8s.io
      resources:
        - pods
        - nodes
      verbs:
        - get
        - list
        - watch

---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.metrics.k8s.io
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: metrics
spec:
  service:
    name: metrics-server
    namespace: kube-system
  group: metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-server:system:auth-delegator
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: system:auth-delegator
  subjects:
    - kind: ServiceAccount
      name: metrics-server-sa
      namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:metrics-server
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: system:metrics-server
  subjects:
    - kind: ServiceAccount
      name: metrics-server-sa
      namespace: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-server
    spec:
      serviceAccountName: metrics-server-sa
      containers:
        - name: metrics-server
          image: registry.k8s.io/metrics-server/metrics-server:v0.7.2
          args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
          ports:
            - containerPort: 10250
              name: https
              protocol: TCP
          resources:
            requests:
              cpu: '100m'
              memory: '200Mi'
            limits:
              cpu: '100m'
              memory: '200Mi'
          livenessProbe:
            httpGet:
              path: /livez
              port: 10250
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 10250
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
      priorityClassName: system-cluster-critical

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:metrics-server
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  rules:
    - apiGroups:
        - ''
      resources:
        - pods
        - nodes
        - namespaces
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - ''
      resources:
        - nodes/metrics
        - nodes/stats
      verbs:
        - get

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-server-sa
  namespace: kube-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: metrics

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: metrics
    kubernetes.io/cluster-service: 'true'
    kubernetes.io/name: Metrics-server
spec:
  selector:
    app.kubernetes.io/name: metrics-server
  ports:
    - port: 443
      targetPort: 10250
      protocol: TCP
      name: https

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-encrypted
  labels:
    app.kubernetes.io/name: gp3-encrypted
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: storage
spec:
  provisioner: ebs.csi.aws.com
  parameters:
    type: gp3
    fsType: ext4
    encrypted: 'true'
    iops: 3000
    throughput: 125
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: adot-collector-role
  labels:
    app.kubernetes.io/name: adot-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  rules:
    - apiGroups:
        - ''
      resources:
        - pods
        - nodes
        - endpoints
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - apps
      resources:
        - replicasets
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - batch
      resources:
        - jobs
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - ''
      resources:
        - nodes/proxy
      verbs:
        - get
    - apiGroups:
        - ''
      resources:
        - nodes/stats
        - configmaps
        - events
      verbs:
        - create
        - get
    - apiGroups:
        - ''
      resources:
        - configmaps
      verbs:
        - get
        - update
        - create
      resourceNames:
        - otel-container-insight-clusterleader

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adot-collector-binding
  labels:
    app.kubernetes.io/name: adot-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: adot-collector-role
  subjects:
    - kind: ServiceAccount
      name: adot-collector-sa
      namespace: amazon-metrics

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-collector-config
  namespace: amazon-metrics
  labels:
    app.kubernetes.io/name: adot-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  config.yaml: 'receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 30s
    send_batch_size: 8192

exporters:
  awsemf:
    region: us-east-1
    namespace: ContainerInsights
    log_group_name: ''/aws/containerinsights/eks-microservice/performance''
    dimension_rollup_option: NoDimensionRollup
  awsxray:
    region: us-east-1

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsemf, awsxray]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsxray]
'

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: adot-collector
  namespace: amazon-metrics
  labels:
    app.kubernetes.io/name: adot-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: adot-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adot-collector
    spec:
      serviceAccountName: adot-collector-sa
      containers:
        - name: adot-collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          command:
            - --config=/etc/adot/config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          volumeMounts:
            - name: config
              mountPath: /etc/adot
              readOnly: true
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          configMap:
            name: adot-collector-config
      tolerations:
        - operator: Exists

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adot-collector-sa
  namespace: amazon-metrics
  labels:
    app.kubernetes.io/name: adot-collector
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eks-microservice-adot-role

---
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-cloudwatch
  labels:
    app.kubernetes.io/managed-by: chant

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-role
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  rules:
    - apiGroups:
        - ''
      resources:
        - namespaces
        - pods
      verbs:
        - get
        - list
        - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-binding
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: fluent-bit-role
  subjects:
    - kind: ServiceAccount
      name: fluent-bit-sa
      namespace: amazon-cloudwatch

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: config
data:
  fluent-bit.conf: '[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Tag               kube.*
    Path              /var/log/containers/*.log
    Parser            docker
    DB                /var/fluent-bit/state/flb_container.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Merge_Log           On
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

[OUTPUT]
    Name                cloudwatch_logs
    Match               *
    region              us-east-1
    log_group_name      /aws/eks/eks-microservice/containers
    log_stream_prefix   eks-microservice/
    auto_create_group   true
'

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
    spec:
      serviceAccountName: fluent-bit-sa
      containers:
        - name: fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '200m'
              memory: '128Mi'
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /etc/fluent-bit
              readOnly: true
            - name: state
              mountPath: /var/fluent-bit/state
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
        - name: state
          hostPath:
            path: /var/fluent-bit/state/fluent-bit
      tolerations:
        - operator: Exists

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit-sa
  namespace: amazon-cloudwatch
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: agent
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eks-microservice-fluent-bit-role

---
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-metrics
  labels:
    app.kubernetes.io/managed-by: chant

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservice-alb
  namespace: microservice
  labels:
    app.kubernetes.io/name: microservice-alb
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/abc-123-def
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - host: api.eks-microservice.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: microservice-api
                port:
                  number: 8080

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-role
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  rules:
    - apiGroups:
        - ''
      resources:
        - services
        - endpoints
        - pods
      verbs:
        - get
        - watch
        - list
    - apiGroups:
        - extensions
        - networking.k8s.io
      resources:
        - ingresses
      verbs:
        - get
        - watch
        - list
    - apiGroups:
        - ''
      resources:
        - nodes
      verbs:
        - list
        - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-binding
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: rbac
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: external-dns-role
  subjects:
    - kind: ServiceAccount
      name: external-dns-sa
      namespace: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: kube-system
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/managed-by: chant
    app.kubernetes.io/component: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
    spec:
      serviceAccountName: external-dns-sa
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.0
          args:
            - --source=ingress
            - --provider=aws
            - --policy=upsert-only
            - --registry=txt
            - --domain-filter=eks-microservice.internal
            - --txt-owner-id=eks-microservice
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '100m'
              memory: '128Mi'
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-sa
